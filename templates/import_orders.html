
{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="mb-4">
    <h2 class="mb-0 fw-bold" style="color: var(--gray-900);">
      <i data-lucide="shopping-cart"></i> นำเข้า Orders
    </h2>
    <p class="text-muted mt-2">อัปโหลดไฟล์ Excel เพื่อนำเข้าข้อมูลออเดอร์</p>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post" enctype="multipart/form-data" class="row g-3">
  <div class="col-md-3">
    <label class="form-label">แพลตฟอร์ม</label>
    <select name="platform" class="form-select" required>
      <option value="">เลือกแพลตฟอร์ม</option>
      <option>Shopee</option>
      <option>TikTok</option>
      <option>Lazada</option>
      <option>อื่นๆ</option>
    </select>
  </div>
  <div class="col-md-3">
    <label class="form-label">ชื่อร้าน</label>
    <input name="shop_name" class="form-control" list="shops" placeholder="พิมพ์หรือเลือก" required>
    <datalist id="shops">
      {% for s in shops %}<option value="{{s.name}} ({{s.platform}})">{% endfor %}
    </datalist>
  </div>
  <div class="col-md-4">
    <label class="form-label">ไฟล์ Excel</label>
    <input type="file" name="file" class="form-control" required>
  </div>
        <div class="col-12">
          <button class="btn btn-primary">
            <i data-lucide="upload"></i> นำเข้า
          </button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
            <i data-lucide="arrow-left"></i> กลับ
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
